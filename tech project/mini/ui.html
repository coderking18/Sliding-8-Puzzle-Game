<!DOCTYPE html>
<html>
<head>
    <title>8 Puzzle Game</title>

    <style>
        body {
            background: linear-gradient(135deg,#0f172a,#020617);
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: violet;
        }

        .controls {
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .mode {
            background: #6d28d9;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .tile {
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 25px;
            border-radius: 15px;
            cursor: pointer;
            color: white;
        }

        .empty {
            background: black;
        }

        .t1 {background:#7c3aed;}
        .t2 {background:#06b6d4;}
        .t3 {background:#10b981;}
        .t4 {background:#f97316;}
        .t5 {background:#ec4899;}
        .t6 {background:#6366f1;}
        .t7 {background:#84cc16;}
        .t8 {background:#d946ef;}

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .box {
            background: #1e293b;
            padding: 10px 15px;
            border-radius: 10px;
        }

        #status {
            margin-top: 20px;
            color: #22c55e;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>8 Puzzle Game</h1>

<div class="controls">
    <button class="mode" onclick="setMode('number')"># Numbers</button>
    <button class="mode" onclick="setMode('letter')">🔤 Letters</button>
</div>

<div class="stats">
    <div class="box">Moves: <span id="moves">0</span></div>
    <div class="box">Time: <span id="time">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="controls">
    <button onclick="shuffle()">Shuffle</button>
    <button onclick="restart()">Restart</button>
</div>

<h2 id="status"></h2>

<script>

// ============================
// STATE (C++ STYLE ARRAY)
// ============================

let state = [1,2,3,4,5,6,7,8,0];
let moves = 0;
let time = 0;
let mode = "number";
let timer;

// ============================
// DRAW GRID
// ============================

function draw() {
    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let i = 0; i < 9; i++) {
        let tile = document.createElement("div");
        tile.className = "tile t" + state[i];

        if (state[i] === 0) {
            tile.classList.add("empty");
            tile.innerText = "";
        } else {
            tile.innerText = mode === "number"
                ? state[i]
                : String.fromCharCode(64 + state[i]);
        }

        tile.onclick = () => move(i);
        grid.appendChild(tile);
    }
}

// ============================
// MOVE LOGIC
// ============================

function move(i) {
    let empty = state.indexOf(0);

    let valid = [empty-1, empty+1, empty-3, empty+3];

    if (valid.includes(i)) {
        [state[i], state[empty]] = [state[empty], state[i]];

        moves++;
        document.getElementById("moves").innerText = moves;

        draw();
        checkWin();
    }
}

// ============================
// SHUFFLE
// ============================

function shuffle() {
    for (let i = 0; i < 100; i++) {
        let r = Math.floor(Math.random() * 9);
        move(r);
    }
}

// ============================
// MODE SWITCH
// ============================

function setMode(m) {
    mode = m;
    draw();
}

// ============================
// TIMER
// ============================

function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        time++;
        document.getElementById("time").innerText = time;
    }, 1000);
}

// ============================
// CHECK WIN
// ============================

function checkWin() {
    if (state.toString() === "1,2,3,4,5,6,7,8,0") {
        document.getElementById("status").innerHTML =
            "🎉 <b>Congratulations!</b><br>You solved the puzzle in "
            + moves + " moves and " + time + " seconds!";
        clearInterval(timer);
    }
}

// ============================
// RESTART
// ============================

function restart() {
    state = [1,2,3,4,5,6,7,8,0];
    moves = 0;
    time = 0;

    document.getElementById("moves").innerText = moves;
    document.getElementById("time").innerText = time;
    document.getElementById("status").innerText = "";

    startTimer();
    draw();
}

// INIT
draw();
startTimer();

</script>

</body>
</html>
